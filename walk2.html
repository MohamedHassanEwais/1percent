<!DOCTYPE html>

<html class="dark" dir="rtl" lang="ar"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-tint": "#bbd200",
              "tertiary-fixed": "#c9e8f1",

              "primary-fixed-dim": "#bbd200",
              "on-primary-fixed-variant": "#424b00",
              "on-primary-fixed": "#191e00",
              "surface-container-low": "#1c1b1b",
              "inverse-primary": "#586400",
              "secondary-fixed": "#dcec79",
              "surface-container-high": "#2a2a2a",
              "surface": "#131313",
              "surface-container-lowest": "#0e0e0e",
              "on-secondary-container": "#e1f17e",
              "on-tertiary-container": "#4c6971",
              "error-container": "#93000a",
              "error": "#ffb4ab",
              "secondary-container": "#626f01",
              "surface-dim": "#131313",
              "on-error-container": "#ffdad6",
              "tertiary-container": "#c9e8f1",
              "on-primary": "#2d3400",
              "on-secondary-fixed": "#191e00",
              "background": "#131313",
              "secondary-fixed-dim": "#c0cf61",
              "primary-container": "#d5f000",
              "on-surface": "#e5e2e1",
              "outline-variant": "#464932",
              "on-background": "#e5e2e1",
              "primary-fixed": "#d5f000",
              "surface-variant": "#353534",
              "on-error": "#690005",
              "secondary": "#c0cf61",
              "on-tertiary-fixed-variant": "#2e4b52",
              "inverse-surface": "#e5e2e1",
              "surface-container": "#201f1f",
              "on-tertiary-fixed": "#001f26",
              "on-surface-variant": "#c7c9ab",
              "on-secondary-fixed-variant": "#424b00",
              "on-secondary": "#2d3400",
              "tertiary-fixed-dim": "#adccd4",
              "outline": "#909378",
              "on-primary-container": "#5e6b00",
              "inverse-on-surface": "#313030",
              "on-tertiary": "#17343b",
              "tertiary": "#ffffff",
              "surface-bright": "#393939",
              "primary": "#ffffff"
            },
            fontFamily: {
              "headline": ["Inter"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .neon-glow {
            box-shadow: 0 0 20px rgba(213, 240, 0, 0.15);
        }
        .active-dot {
            box-shadow: 0 0 8px rgba(213, 240, 0, 0.5);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body min-h-screen flex flex-col overflow-hidden">
<!-- Top App Bar -->
<header class="bg-[#131313] text-right rtl fixed top-0 full-width w-full z-50">
<div class="flex flex-row-reverse justify-between items-center w-full px-6 py-4">
<div class="flex items-center gap-4">
<span class="text-xl font-bold text-[#E3FF00] font-inter">دلتا ليب</span>
</div>
<div class="flex items-center gap-4">
<button class="hover:bg-[#2A2A2A] transition-colors p-2 rounded-full active:scale-95 duration-150">
<span class="material-symbols-outlined text-[#E3FF00]">settings</span>
</button>
</div>
</div>
</header>
<!-- Main Content: Walkthrough Carousel -->
<main class="flex-grow flex flex-col items-center justify-center px-6 pt-24 pb-32">
<div class="w-full max-w-lg space-y-12">
<!-- Asymmetric Bento-Style Illustration Container -->
<div class="relative w-full aspect-square flex items-center justify-center">
<!-- Background decorative elements -->
<div class="absolute inset-0 bg-primary-fixed opacity-5 blur-[100px] rounded-full"></div>
<!-- Main Illustration: Memory Cards -->
<div class="relative z-10 grid grid-cols-12 grid-rows-12 w-full h-full gap-4 p-4">
<!-- Large Primary Card -->
<div class="col-span-8 row-span-8 bg-surface-container-high rounded-xl neon-glow flex flex-col items-center justify-center p-8 border border-outline-variant/15 rotate-[-2deg]">
<span class="material-symbols-outlined text-primary-fixed text-7xl mb-4" style="font-variation-settings: 'FILL' 1;">style</span>
<div class="h-2 w-24 bg-primary-fixed/20 rounded-full"></div>
</div>
<!-- Secondary Floating Cards -->
<div class="col-start-8 col-span-5 row-start-3 row-span-5 bg-primary-fixed rounded-xl flex items-center justify-center rotate-[6deg] shadow-2xl">
<span class="material-symbols-outlined text-on-primary-fixed text-5xl">auto_stories</span>
</div>
<div class="col-start-2 col-span-4 row-start-9 row-span-4 bg-surface-container-highest rounded-xl flex items-center justify-center rotate-[-8deg] border border-outline-variant/15">
<span class="material-symbols-outlined text-primary-fixed-dim text-4xl">psychology</span>
</div>
<!-- Pulse/Energy lines -->
<div class="absolute top-1/2 right-0 w-32 h-[2px] bg-gradient-to-l from-primary-fixed to-transparent opacity-30"></div>
</div>
</div>
<!-- Text Content -->
<div class="text-right space-y-4 rtl">
<h1 class="text-3xl md:text-4xl font-extrabold text-on-surface leading-tight tracking-tight">
                    التكرار المتباعد: السر وراء الذاكرة الحديدية
                </h1>
<p class="text-lg text-on-surface-variant leading-relaxed max-w-md">
                    نظام ذكي يحدد الوقت المثالي لمراجعة الكلمات قبل نسيانها.
                </p>
</div>
<!-- Progress & Navigation -->
<div class="flex flex-row-reverse items-center justify-between mt-auto">
<!-- Progress Dots -->
<div class="flex flex-row-reverse gap-3">
<div class="w-8 h-2 rounded-full bg-primary-fixed active-dot"></div>
<div class="w-2 h-2 rounded-full bg-surface-container-highest"></div>
<div class="w-2 h-2 rounded-full bg-surface-container-highest"></div>
</div>
<!-- Primary Action -->
<button class="bg-gradient-to-br from-primary-fixed to-primary-fixed-dim text-on-primary-fixed font-bold px-8 py-3 rounded-xl flex items-center gap-2 hover:scale-105 transition-transform shadow-[0_4px_20px_rgba(213,240,0,0.2)]">
<span>التالي</span>
<span class="material-symbols-outlined text-lg">arrow_back</span>
</button>
</div>
</div>
</main>
<!-- Bottom Navigation Shell (Suppressed based on "Task-Focused" rule but kept as guide for layout if it were a dashboard) -->
<!-- Note: Following the rule "Automatic Suppression: You MUST exclude the navigation shell if the page intent is: Onboarding" -->
</body></html>
