<body class="bg-surface text-on-surface font-body min-h-screen flex flex-col items-center justify-center p-6 rtl">
<!-- Main Content Canvas -->
<main class="w-full max-w-lg mx-auto flex flex-col items-center space-y-12">
<!-- Header Section -->
<header class="text-center space-y-4">
<h1 class="text-4xl md:text-5xl font-extrabold tracking-tight text-primary-fixed leading-tight">
                قاعدة الـ 95%: <br/>
<span class="text-on-surface">منطقة الاكتساب الأمثل</span>
</h1>
<p class="text-lg text-on-surface-variant max-w-sm mx-auto leading-relaxed">
                تعلم من خلال محتوى تفهمه بنسبة 95% على الأقل لضمان التقدم المستمر
            </p>
</header>
<!-- The "Sweet Spot" Illustration (Asymmetric Bento Style) -->
<section class="w-full relative group">
<div class="grid grid-cols-12 gap-4">
<!-- Main Gauge Card -->
<div class="col-span-12 bg-surface-container-high rounded-xl p-8 flex flex-col items-center justify-center relative overflow-hidden border border-outline-variant/15">
<!-- Background Ambient Glow -->
<div class="absolute -top-24 -right-24 w-64 h-64 bg-primary-fixed/5 rounded-full blur-[80px]"></div>
<!-- Comprehension Scale -->
<div class="w-full space-y-8 relative z-10">
<div class="flex justify-between items-end mb-2">
<span class="text-sm font-label text-on-surface-variant">صعب جداً</span>
<span class="text-2xl font-bold text-primary-fixed">95% - 98%</span>
<span class="text-sm font-label text-on-surface-variant">سهل جداً</span>
</div>
<!-- The Slider Track -->
<div class="h-4 w-full bg-surface-container-highest rounded-full relative overflow-hidden">
<!-- Inactive Track -->
<div class="absolute inset-0 bg-surface-container-lowest opacity-50"></div>
<!-- Active Progress Zone -->
<div class="absolute right-0 top-0 h-full w-[95%] bg-gradient-to-l from-primary-fixed to-primary-fixed-dim neon-glow-primary rounded-full"></div>
<!-- The Indicator Dot -->
<div class="absolute right-[95%] top-1/2 -translate-y-1/2 w-6 h-6 bg-white rounded-full border-4 border-primary-fixed-dim shadow-xl transition-all duration-500"></div>
</div>
<!-- Labels Grid -->
<div class="grid grid-cols-3 gap-2 text-center pt-4">
<div class="p-3 bg-surface-container-lowest/40 rounded-lg">
<span class="block text-xs text-on-surface-variant mb-1">الإحباط</span>
<span class="text-error font-bold">80%</span>
</div>
<div class="p-3 bg-primary-fixed/10 border border-primary-fixed/20 rounded-lg scale-110 shadow-lg">
<span class="block text-xs text-primary-fixed mb-1">النمو</span>
<span class="text-primary-fixed font-bold">95%</span>
</div>
<div class="p-3 bg-surface-container-lowest/40 rounded-lg">
<span class="block text-xs text-on-surface-variant mb-1">الملل</span>
<span class="text-on-surface font-bold">100%</span>
</div>
</div>
</div>
</div>
<!-- Descriptive Insight Card -->
<div class="col-span-12 flex items-center gap-4 bg-surface-container-low p-6 rounded-xl">
<div class="flex-shrink-0 w-12 h-12 rounded-full bg-primary-fixed/20 flex items-center justify-center">
<span class="material-symbols-outlined text-primary-fixed" data-icon="lightbulb">lightbulb</span>
</div>
<div>
<h4 class="font-bold text-on-surface">لماذا 95%؟</h4>
<p class="text-sm text-on-surface-variant">تسمح لك هذه النسبة باستنتاج الكلمات الجديدة من السياق دون الحاجة للترجمة الدائمة.</p>
</div>
</div>
</div>
</section>
<!-- Progress and Actions -->
<footer class="w-full flex flex-col items-center space-y-10 pb-12">
<!-- Progress Dots -->
<div class="flex items-center space-x-3 space-x-reverse">
<div class="w-2.5 h-2.5 rounded-full bg-surface-container-highest"></div>
<div class="w-2.5 h-2.5 rounded-full bg-surface-container-highest"></div>
<!-- Active Indicator -->
<div class="w-8 h-2.5 rounded-full bg-primary-fixed neon-glow-primary"></div>
</div>
<!-- Start Now Button -->
<button class="group relative w-full py-5 px-8 bg-gradient-to-tr from-primary-fixed to-primary-fixed-dim rounded-xl flex items-center justify-center space-x-4 space-x-reverse transition-all duration-300 hover:scale-[1.02] active:scale-95 neon-glow-primary">
<span class="text-on-primary-fixed text-xl font-extrabold">ابدأ الآن</span>
<span class="material-symbols-outlined text-on-primary-fixed group-hover:translate-x-[-4px] transition-transform" data-icon="arrow_back">arrow_back</span>
</button>
</footer>
</main>
