<nav class="fixed top-0 w-full z-50 bg-[#131313] shadow-[0_4px_20px_rgba(227,255,0,0.05)] flex justify-between items-center px-6 py-4 h-16">

<div class="h-2 w-48 bg-surface-container-highest rounded-full overflow-hidden">
<div class="h-full bg-primary-fixed w-[65%] neon-glow-primary transition-all duration-500"></div>
</div>

</div>

</div>
<h1 class="text-3xl md:text-4xl font-black leading-tight tracking-tight mb-8">
                ما هو المعنى الدقيق لكلمة <span class="text-[#D5F000] italic underline decoration-2 underline-offset-8">"الاستدامة"</span> في سياق الحفاظ على البيئة؟
            </h1>
<div class="rounded-xl overflow-hidden mb-12 shadow-2xl">
<img alt="Context Visual" class="w-full h-64 object-cover opacity-80" data-alt="Modern abstract representation of ecological sustainability with glowing green neon circuits interwoven through deep dark forest leaves at night" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC6jepDYoL4hd7-iy5StVHiMRpKN04LI_2jzxE_2VwTtchhzM6slc5e-avZcmyPRD3o3pfIPPm2WeqVXjKQg2lOMPsTaWx1XGnbflpEQpY6jRDK-vi-YqL6tW7NUXhuzpSyYREa2kL7SqNCpfLokEJcvFgQnqrqP9P3Nv8ymcgm4P90j-LpheoXJr5t5suqIqn16sY_0s68crAY_xO3TDiLn0bkdlJjAV_H2hTbUV7CZqS0TRAc76EJdC272eSf8ZhED6fDE4QCo1A"/>

<!-- Option 1 (Default) -->
<button class="group relative flex items-center p-6 bg-surface-container-high rounded-xl hover:bg-surface-container-highest transition-all duration-300 text-right active:scale-[0.98]">
<div class="flex-shrink-0 w-10 h-10 rounded-lg bg-surface-container-low flex items-center justify-center font-black text-on-surface-variant group-hover:text-primary-fixed transition-colors">أ</div>
<div class="mr-4">
<p class="text-lg font-bold">القدرة على الاستهلاك السريع للموارد</p>
</div>
</button>
<!-- Option 2 (Selected State) -->
<button class="group relative flex items-center p-6 bg-surface-container-highest ring-2 ring-primary-fixed rounded-xl transition-all duration-300 text-right neon-glow-primary active:scale-[0.98]">
<div class="flex-shrink-0 w-10 h-10 rounded-lg bg-primary-fixed flex items-center justify-center font-black text-on-primary-fixed">ب</div>
<div class="mr-4">
<p class="text-lg font-bold text-on-surface">تلبية احتياجات الحاضر دون المساس بقدرة الأجيال القادمة</p>
</div>
<div class="absolute left-6 text-primary-fixed">
<span class="material-symbols-outlined" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</button>

<button class="group relative flex items-center p-6 bg-surface-container-high rounded-xl hover:bg-surface-container-highest transition-all duration-300 text-right active:scale-[0.98]">
<div class="flex-shrink-0 w-10 h-10 rounded-lg bg-surface-container-low flex items-center justify-center font-black text-on-surface-variant group-hover:text-primary-fixed transition-colors">ج</div>
<div class="mr-4">
<p class="text-lg font-bold">التركيز فقط على التطور الصناعي والتقني</p>
</div>
</button>
<!-- Option 4 (Default) -->
<button class="group relative flex items-center p-6 bg-surface-container-high rounded-xl hover:bg-surface-container-highest transition-all duration-300 text-right active:scale-[0.98]">
<div class="flex-shrink-0 w-10 h-10 rounded-lg bg-surface-container-low flex items-center justify-center font-black text-on-surface-variant group-hover:text-primary-fixed transition-colors">د</div>
<div class="mr-4">
<p class="text-lg font-bold">زيادة الإنتاج المحلي بأي ثمن ممكن</p>
</div>
</button>
</div>
