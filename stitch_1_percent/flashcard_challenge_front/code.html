<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Flashcard Challenge Front</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#9513ec",
                        "background-light": "#f7f6f8",
                        "background-dark": "#000000",
                        "electric-lime": "#ccff00",
                        "deep-violet": "#3c096c",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "2xl": "1rem", "3xl": "1.5rem", "full": "9999px" },
                },
            },
        }
    </script>
<style>
        .glassmorphism {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased min-h-screen flex flex-col">
<!-- Top App Bar -->
<div class="flex items-center px-6 pt-12 pb-4 justify-between w-full z-10">
<button class="text-white/70 hover:text-white flex size-10 shrink-0 items-center justify-center rounded-full active:bg-white/10 transition-colors">
<span class="material-symbols-outlined text-2xl">arrow_back_ios_new</span>
</button>
<h2 class="text-white text-lg font-bold leading-tight tracking-wide flex-1 text-center opacity-80 uppercase text-xs">Flashcard Challenge</h2>
<button class="group flex items-center justify-center gap-1.5 px-3 py-1.5 rounded-full bg-white/5 hover:bg-white/10 border border-white/5 transition-all shadow-[0_0_10px_rgba(204,255,0,0.1)] hover:shadow-[0_0_15px_rgba(204,255,0,0.2)]">
<span class="text-electric-lime material-symbols-outlined text-sm">lightbulb</span>
<span class="text-electric-lime text-xs font-bold uppercase tracking-wider">Hint</span>
</button>
</div>
<!-- Main Content Area -->
<main class="flex-1 flex flex-col items-center justify-center w-full px-6 py-8 relative">
<!-- Background decorative glow -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-64 h-64 bg-primary/20 rounded-full blur-[100px] pointer-events-none"></div>
<!-- Central Glassmorphic Card -->
<div class="w-full max-w-sm aspect-[3/4] glassmorphism rounded-3xl relative overflow-hidden flex flex-col shadow-2xl shadow-black/50 group cursor-pointer transition-transform duration-300 hover:scale-[1.02]">
<!-- Abstract Image Container -->
<div class="absolute inset-0 z-0">
<div class="w-full h-full bg-cover bg-center opacity-60 mix-blend-overlay" data-alt="Abstract dark fluid geometric shapes in deep violet" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuCeg50J3LZXr9hR6c4oxpxQLkBhOXeQumaMcJeqdfTNEAIOu2QP0zw6Gn_jcwOeZvJ8gZmlh_vU_1nr9W9E4p-PRSfk_VMr71SjJS2qtUoWSFnPtHjWICeY3GmRk2f_Hqm2Gm7gSQ7NDfgHRbpiGzUX6-ufXTbtOs1E0VWtmpS8rFUJ3X6aCqNHjnYrx4A5DWVfZTYSpG7d80m66C2SaIOwUrV0r0LWyC27gPSJ73QC4tJ5aaky_KtMOhpdJW_kM4tg6h7jIKaH8KM");'>
</div>
<!-- Gradient overlay for depth -->
<div class="absolute inset-0 bg-gradient-to-b from-transparent via-[#000000]/20 to-[#000000]/80"></div>
</div>
<!-- Card Content (Minimalist) -->
<div class="relative z-10 flex flex-col items-center justify-center h-full w-full gap-8 p-8">
<!-- Audio Icon Circle -->
<div class="flex items-center justify-center size-24 rounded-full bg-deep-violet/40 border border-white/10 backdrop-blur-md shadow-lg shadow-deep-violet/20 group-hover:bg-deep-violet/60 transition-all duration-500">
<span class="material-symbols-outlined text-white text-4xl group-hover:scale-110 transition-transform duration-300">headphones</span>
</div>
<!-- Subtle tap hint -->
<div class="absolute bottom-8 text-white/30 text-xs font-medium uppercase tracking-[0.2em] animate-pulse">
                    Tap to Flip
                </div>
</div>
<!-- Progress Bar at bottom of card -->
<div class="absolute bottom-0 left-0 w-full h-1 bg-white/5">
<div class="h-full bg-gradient-to-r from-deep-violet to-primary w-1/3 shadow-[0_0_10px_rgba(149,19,236,0.5)]"></div>
</div>
</div>
</main>
<!-- Bottom Actions (Optional context for flashcard app) -->
<div class="w-full px-8 pb-10 pt-4 flex justify-center gap-12 z-10">
<button class="flex flex-col items-center gap-1 text-white/30 hover:text-white/80 transition-colors">
<span class="material-symbols-outlined text-3xl">close</span>
</button>
<button class="flex flex-col items-center gap-1 text-white/30 hover:text-electric-lime transition-colors">
<span class="material-symbols-outlined text-3xl filled">bookmark</span>
</button>
</div>
</body></html>
