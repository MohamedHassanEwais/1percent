<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Walkthrough Carousel</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Theme Configuration -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#c8f906", // Electric Lime from request/theme
                        "background-light": "#f8f8f5",
                        "background-dark": "#000000", // Solid black as requested
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "1rem", 
                        "lg": "2rem", 
                        "xl": "3rem", 
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        /* Custom styles for dust particles effect */
        .dust-particle {
            position: absolute;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            pointer-events: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased overflow-hidden">
<div class="relative flex h-screen w-full flex-col bg-background-light dark:bg-background-dark group/design-root overflow-hidden max-w-md mx-auto shadow-2xl">
<!-- Floating Dust Particles (Decorative Background) -->
<div class="absolute inset-0 overflow-hidden pointer-events-none z-0 opacity-40">
<div class="dust-particle w-1 h-1 top-[10%] left-[20%] animate-pulse"></div>
<div class="dust-particle w-2 h-2 top-[30%] left-[80%] opacity-20"></div>
<div class="dust-particle w-1 h-1 top-[60%] left-[10%] animate-pulse"></div>
<div class="dust-particle w-1.5 h-1.5 top-[80%] left-[60%] opacity-30"></div>
<div class="dust-particle w-1 h-1 top-[15%] left-[90%]"></div>
<!-- Subtle gradient glow -->
<div class="absolute -top-20 -right-20 w-64 h-64 bg-primary/10 rounded-full blur-3xl"></div>
<div class="absolute top-[40%] -left-20 w-48 h-48 bg-primary/5 rounded-full blur-3xl"></div>
</div>
<!-- Header / Skip Action -->
<div class="relative z-10 flex w-full justify-end px-6 pt-12 pb-4">
<button class="text-white/60 hover:text-white text-sm font-medium transition-colors">
                Skip
            </button>
</div>
<!-- Main Content Area -->
<div class="relative z-10 flex flex-col flex-grow items-center justify-between pb-8">
<!-- Image Area -->
<div class="w-full px-6 flex-grow flex items-center justify-center">
<div class="relative w-full aspect-[4/5] rounded-3xl overflow-hidden shadow-[0_0_30px_rgba(200,249,6,0.1)] border border-white/10 bg-white/5 backdrop-blur-sm">
<div class="absolute inset-0 bg-center bg-no-repeat bg-cover" data-alt="Minimalist neon illustration of a stick figure climbing a glowing Electric Lime chart" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuCO9fBK3mFvyg75Bok4Aka9FKExvk4dQNHZOZgNVN9jT2F2wIAbT63k4EGc7HpPRbgtME5CrwvV6uShm7XmE8hQIV8iLty3m49J9XpSuLTL6j0ifPwMyKf8sIfdbbR3rIcpV3--fGxBHxtwdFbuxXjLQ2Z3uYylpzBEVUObFS-jtkvc7BTYaHnuxbw1BqqQlfpovCQ9c2z5Dtb6pWLeaPnNuRsggGMMW0Pv4x5TK96EpEuS3umI7KQfGyE8vEBzWDX1Va0badXwkPE");'>
<div class="absolute inset-0 bg-gradient-to-t from-background-dark via-transparent to-transparent opacity-80"></div>
<!-- Color Overlay to match Electric Lime theme -->
<div class="absolute inset-0 bg-primary/10 mix-blend-overlay"></div>
</div>
</div>
</div>
<!-- Text & Indicators Section -->
<div class="w-full flex flex-col items-center gap-6 px-6 mt-6">
<!-- Headline -->
<div class="text-center space-y-3">
<h1 class="text-white text-[32px] font-bold leading-[1.1] tracking-tight">
                        Master <span class="text-primary drop-shadow-[0_0_8px_rgba(200,249,6,0.5)]">3000 words</span>.<br/>Just 10 minutes a day
                    </h1>
<p class="text-white/60 text-lg font-light leading-relaxed max-w-xs mx-auto">
                        Consistent marginal gains compound into massive results over time.
                    </p>
</div>
<!-- Page Indicators -->
<div class="flex flex-row items-center justify-center gap-2 py-4">
<div class="h-1.5 w-1.5 rounded-full bg-white/20 transition-all duration-300"></div>
<div class="h-1.5 w-8 rounded-full bg-primary shadow-[0_0_10px_rgba(200,249,6,0.6)] transition-all duration-300"></div>
<div class="h-1.5 w-1.5 rounded-full bg-white/20 transition-all duration-300"></div>
<div class="h-1.5 w-1.5 rounded-full bg-white/20 transition-all duration-300"></div>
</div>
<!-- Action Button -->
<div class="w-full pt-2 pb-6">
<button class="relative w-full group overflow-hidden rounded-full h-14 bg-white/5 border border-white/10 backdrop-blur-md transition-all duration-300 hover:bg-white/10 active:scale-[0.98]">
<!-- Glow effect -->
<div class="absolute inset-0 bg-primary/20 opacity-0 group-hover:opacity-100 transition-opacity duration-500 blur-xl"></div>
<div class="relative flex items-center justify-between px-2 pl-6">
<span class="text-white text-lg font-bold tracking-wide">Next</span>
<div class="h-10 w-10 rounded-full bg-primary flex items-center justify-center shadow-[0_0_15px_rgba(200,249,6,0.4)] group-hover:shadow-[0_0_25px_rgba(200,249,6,0.6)] transition-all duration-300">
<span class="material-symbols-outlined text-background-dark font-bold text-xl">arrow_forward</span>
</div>
</div>
</button>
</div>
</div>
</div>
</div>
</body></html>
