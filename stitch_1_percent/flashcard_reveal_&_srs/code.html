<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Flashcard Reveal &amp; SRS - 1 Percent</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#9513ec",
                        "background-light": "#f7f6f8",
                        "background-dark": "#1b1022",
                        "neon-red": "#FF4D4D",
                        "neon-orange": "#FFA500",
                        "neon-violet": "#9513ec",
                        "neon-lime": "#ccff00",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "2xl": "1rem", "full": "9999px" },
                    boxShadow: {
                        'neon-red': '0 0 15px rgba(255, 77, 77, 0.4)',
                        'neon-orange': '0 0 15px rgba(255, 165, 0, 0.4)',
                        'neon-violet': '0 0 15px rgba(149, 19, 236, 0.4)',
                        'neon-lime': '0 0 15px rgba(204, 255, 0, 0.4)',
                    }
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        h1, h2, h3, h4, h5, h6 {
            font-family: 'Space Grotesk', sans-serif;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex flex-col items-center justify-center overflow-hidden relative">
<!-- Background Decoration -->
<div class="absolute top-0 left-0 w-full h-full overflow-hidden pointer-events-none z-0">
<div class="absolute top-[-10%] right-[-10%] w-96 h-96 bg-primary/20 rounded-full blur-[100px]"></div>
<div class="absolute bottom-[-10%] left-[-10%] w-96 h-96 bg-blue-500/10 rounded-full blur-[100px]"></div>
</div>
<div class="w-full max-w-md h-full min-h-screen flex flex-col relative z-10">
<!-- Top Bar -->
<div class="flex items-center p-6 pb-2 justify-between w-full">
<button class="text-white/80 hover:text-white transition-colors flex size-12 shrink-0 items-center justify-center rounded-full hover:bg-white/5">
<span class="material-symbols-outlined text-[24px]">arrow_back</span>
</button>
<div class="flex flex-col items-center">
<h2 class="text-white/60 text-xs font-medium tracking-widest uppercase">Deck: Philosophies</h2>
<div class="flex gap-1 mt-1">
<div class="w-1.5 h-1.5 rounded-full bg-primary"></div>
<div class="w-1.5 h-1.5 rounded-full bg-white/20"></div>
<div class="w-1.5 h-1.5 rounded-full bg-white/20"></div>
<div class="w-1.5 h-1.5 rounded-full bg-white/20"></div>
</div>
</div>
<button class="text-white/80 hover:text-white transition-colors flex size-12 shrink-0 items-center justify-center rounded-full hover:bg-white/5">
<span class="material-symbols-outlined text-[24px]">more_vert</span>
</button>
</div>
<!-- Main Flashcard Content -->
<div class="flex-1 flex flex-col items-center justify-center px-6 py-8 w-full">
<!-- Card Container -->
<div class="w-full relative group perspective-1000">
<div class="relative w-full bg-[#251b2e]/80 backdrop-blur-xl border border-white/10 rounded-3xl p-8 flex flex-col items-center shadow-2xl overflow-hidden">
<!-- Decorative inner glow -->
<div class="absolute inset-0 bg-gradient-to-b from-primary/5 to-transparent pointer-events-none"></div>
<!-- Word -->
<h1 class="text-white tracking-tight text-5xl font-bold leading-tight text-center mb-4 mt-4 drop-shadow-md">Ephemeral</h1>
<!-- IPA -->
<div class="inline-flex items-center justify-center px-4 py-1.5 rounded-full bg-white/5 border border-white/10 mb-8">
<p class="text-primary/90 text-lg font-mono tracking-wide">/əˈfem(ə)rəl/</p>
</div>
<!-- Divider -->
<div class="w-12 h-0.5 bg-gradient-to-r from-transparent via-white/20 to-transparent mb-8"></div>
<!-- Translation -->
<div class="w-full mb-8 text-center">
<p class="text-white/60 text-sm font-medium uppercase tracking-widest mb-2">Definition</p>
<h3 class="text-white text-2xl font-semibold leading-snug">Lasting for a very short time.</h3>
</div>
<!-- Example Sentence -->
<div class="w-full bg-background-dark/50 rounded-xl p-5 border border-white/5 relative">
<span class="absolute top-3 left-3 text-primary/40 material-symbols-outlined text-xl">format_quote</span>
<p class="text-white/90 text-lg font-light leading-relaxed text-center italic px-2 pt-2">
                            "Fashions are <span class="text-primary font-medium not-italic border-b border-primary/30">ephemeral</span>, changing with every season."
                        </p>
</div>
</div>
</div>
</div>
<!-- SRS Buttons Area -->
<div class="w-full px-6 pb-8 pt-2">
<div class="grid grid-cols-4 gap-3">
<!-- Again Button -->
<button class="flex flex-col items-center group/btn active:scale-95 transition-transform duration-100">
<div class="w-full aspect-square rounded-2xl bg-[#2a1d31] border border-neon-red/30 flex flex-col items-center justify-center mb-2 shadow-none hover:shadow-neon-red hover:border-neon-red transition-all duration-300 relative overflow-hidden">
<div class="absolute inset-0 bg-neon-red/5 opacity-0 group-hover/btn:opacity-100 transition-opacity"></div>
<span class="text-white text-xs opacity-60 mb-1 font-mono">&lt; 1m</span>
<span class="material-symbols-outlined text-neon-red text-3xl">replay</span>
</div>
<span class="text-neon-red font-medium text-sm tracking-wide">Again</span>
</button>
<!-- Hard Button -->
<button class="flex flex-col items-center group/btn active:scale-95 transition-transform duration-100">
<div class="w-full aspect-square rounded-2xl bg-[#2a1d31] border border-neon-orange/30 flex flex-col items-center justify-center mb-2 shadow-none hover:shadow-neon-orange hover:border-neon-orange transition-all duration-300 relative overflow-hidden">
<div class="absolute inset-0 bg-neon-orange/5 opacity-0 group-hover/btn:opacity-100 transition-opacity"></div>
<span class="text-white text-xs opacity-60 mb-1 font-mono">2d</span>
<span class="material-symbols-outlined text-neon-orange text-3xl">sentiment_neutral</span>
</div>
<span class="text-neon-orange font-medium text-sm tracking-wide">Hard</span>
</button>
<!-- Good Button -->
<button class="flex flex-col items-center group/btn active:scale-95 transition-transform duration-100">
<div class="w-full aspect-square rounded-2xl bg-[#2a1d31] border border-neon-violet/30 flex flex-col items-center justify-center mb-2 shadow-none hover:shadow-neon-violet hover:border-neon-violet transition-all duration-300 relative overflow-hidden">
<div class="absolute inset-0 bg-neon-violet/5 opacity-0 group-hover/btn:opacity-100 transition-opacity"></div>
<span class="text-white text-xs opacity-60 mb-1 font-mono">4d</span>
<span class="material-symbols-outlined text-neon-violet text-3xl">sentiment_satisfied</span>
</div>
<span class="text-neon-violet font-medium text-sm tracking-wide">Good</span>
</button>
<!-- Easy Button -->
<button class="flex flex-col items-center group/btn active:scale-95 transition-transform duration-100">
<div class="w-full aspect-square rounded-2xl bg-[#2a1d31] border border-neon-lime/30 flex flex-col items-center justify-center mb-2 shadow-none hover:shadow-neon-lime hover:border-neon-lime transition-all duration-300 relative overflow-hidden">
<div class="absolute inset-0 bg-neon-lime/5 opacity-0 group-hover/btn:opacity-100 transition-opacity"></div>
<span class="text-white text-xs opacity-60 mb-1 font-mono">7d</span>
<span class="material-symbols-outlined text-neon-lime text-3xl">sentiment_very_satisfied</span>
</div>
<span class="text-neon-lime font-medium text-sm tracking-wide">Easy</span>
</button>
</div>
<div class="w-full text-center mt-6">
<p class="text-white/20 text-xs font-mono">Improve 1% every day.</p>
</div>
</div>
</div>
</body></html>
