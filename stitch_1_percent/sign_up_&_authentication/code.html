<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>1% - Sign Up</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Syne:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#9513ec",
                        "background-light": "#f7f6f8",
                        "background-dark": "#1b1022", // Keeping theme definition, but screen specific black will be applied via utility
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"],
                        "syne": ["Syne", "sans-serif"],
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                    boxShadow: {
                        'glow': '0 0 20px -5px rgba(149, 19, 236, 0.5)',
                        'glow-hover': '0 0 30px -5px rgba(149, 19, 236, 0.7)',
                    }
                },
            },
        }
    </script>
<style>
        /* Custom noise approximation using a simple gradient pattern for texture */
        .bg-noise {
            background-image: radial-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 24px 24px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-black font-display antialiased">
<div class="relative flex h-full min-h-screen w-full flex-col overflow-x-hidden bg-background-light dark:bg-black group/design-root">
<!-- Subtle background texture overlay -->
<div class="absolute inset-0 pointer-events-none bg-noise opacity-50 z-0"></div>
<!-- Top App Bar -->
<div class="relative z-10 flex items-center p-4 justify-between">
<button class="text-slate-900 dark:text-white flex size-12 shrink-0 items-center justify-center rounded-full hover:bg-black/5 dark:hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined text-[24px]">arrow_back</span>
</button>
</div>
<!-- Main Content -->
<div class="relative z-10 flex flex-1 flex-col px-6 pt-4 pb-8 max-w-md mx-auto w-full">
<!-- Headline -->
<div class="mb-12">
<h1 class="text-slate-900 dark:text-white font-syne text-[40px] font-bold leading-[1.1] tracking-tight mb-2">
                    Save your<br/>
<span class="text-primary">1% progress</span>
</h1>
<p class="text-slate-500 dark:text-slate-400 text-base font-normal">
                    Sync your marginal gains across all devices.
                </p>
</div>
<!-- Google Button -->
<button class="relative group flex w-full cursor-pointer items-center justify-center overflow-hidden rounded-xl h-14 px-5 bg-white text-black shadow-glow hover:shadow-glow-hover transition-all duration-300 border border-transparent hover:border-primary/30 mb-8">
<div class="absolute inset-0 bg-gradient-to-r from-transparent via-primary/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
<div class="flex items-center gap-3 relative z-10">
<!-- Simple Google Icon SVG -->
<svg class="w-6 h-6" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span class="text-base font-bold tracking-wide">Continue with Google</span>
</div>
</button>
<!-- Divider Text -->
<div class="relative flex items-center justify-center mb-8">
<span class="bg-background-light dark:bg-black px-4 text-slate-400 dark:text-[#888888] text-sm font-medium z-10 font-display">
                    Or use email
                </span>
<div class="absolute w-full h-px bg-slate-200 dark:bg-[#333333] z-0"></div>
</div>
<!-- Email Form -->
<div class="flex flex-col gap-5 w-full">
<label class="flex flex-col gap-2 group/input">
<span class="text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400 ml-1">Email Address</span>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-slate-400 dark:text-slate-500 text-[20px] transition-colors group-focus-within/input:text-primary">mail</span>
<input class="flex w-full min-w-0 resize-none rounded-xl text-slate-900 dark:text-white border-none bg-white dark:bg-[#151118] focus:ring-2 focus:ring-primary/50 h-14 placeholder:text-slate-400 dark:placeholder:text-[#555] pl-12 pr-4 text-base font-normal leading-normal shadow-sm ring-1 ring-slate-200 dark:ring-[#333] transition-all" placeholder="name@example.com" type="email" value=""/>
</div>
</label>
<button class="mt-2 flex w-full cursor-pointer items-center justify-center rounded-xl h-14 px-5 bg-primary hover:bg-primary/90 text-white gap-2 text-base font-bold leading-normal tracking-wide transition-colors shadow-lg shadow-primary/20">
<span class="truncate">Continue</span>
<span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</div>
<!-- Footer / Terms -->
<div class="mt-auto pt-10 text-center">
<p class="text-xs text-slate-400 dark:text-[#666] leading-relaxed">
                    By continuing, you agree to our <a class="underline hover:text-primary transition-colors" href="#">Terms of Service</a> and <a class="underline hover:text-primary transition-colors" href="#">Privacy Policy</a>.
                </p>
</div>
</div>
</div>
</body></html>
