<style>
        @keyframes pulse-glow {
            0%, 100% { opacity: 1; transform: scale(1); filter: drop-shadow(0 0 20px rgba(227, 255, 0, 0.4)); }
            50% { opacity: 0.8; transform: scale(0.98); filter: drop-shadow(0 0 40px rgba(227, 255, 0, 0.6)); }
        }
        .animate-pulse-glow {
            animation: pulse-glow 3s ease-in-out infinite;
        }
        .loading-bar-animation {
            width: 0%;
            animation: loading 2.5s ease-in-out infinite;
        }
        @keyframes loading {
            0% { width: 0%; left: 0; }
            50% { width: 100%; left: 0; }
            100% { width: 0%; right: 0; left: auto; }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-surface text-on-surface font-body overflow-hidden">
<!-- Splash Screen Container -->
<main class="relative h-screen w-full flex flex-col items-center justify-center p-8 bg-surface">
<!-- Background Ambient Detail (Subtle Grain/Texture) -->
<div class="absolute inset-0 opacity-[0.03] pointer-events-none" data-alt="subtle dark carbon fiber texture background with deep charcoal tones and minimalist aesthetic" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuD3S3xYl3K9tVX1JlFTGJXPjitfowu8WpzlGYqH76QtEoe3iezaq3S3h22o2ZzLH6rQ2rmzQhXT2_6OOJ3RYslaTKhJeedDkH7Glb1pqGIvMOi1bKEUjX0CA2EPK2nlnC7O9yCmXJBVruVuDgHYvnFpw__9760l5AHhR4A_Uzf1rWuIBf4s418eBzOww6taZINqnOeBGQlPj51hqXaRrcLMSXKBvedHxTp1XPzey3iD0n4LtrzYEanyQU9xB3UQ5TKsJfD_uTwdWRo');">
</div>
<!-- Center Content Branding -->
<div class="relative z-10 flex flex-col items-center gap-12">
<!-- Abstract 'A' Logo with Arabic Influence -->
<div class="relative animate-pulse-glow">
<!-- Outer Glow Layer -->
<div class="absolute inset-0 bg-primary-fixed blur-3xl opacity-10 rounded-full"></div>
<!-- The Logo Core -->
<div class="relative w-32 h-32 flex items-center justify-center">
<svg class="w-full h-full text-primary-fixed fill-current" viewbox="0 0 100 100">
<!-- Abstract Forward Pointing Arrow / Stylized Alif-like 'A' -->
<path d="M20 80 L50 20 L80 80 M50 20 V60 M40 50 H60" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="8"></path>
<path d="M50 20 L90 20 V60" fill="none" opacity="0.5" stroke="currentColor" stroke-linecap="round" stroke-width="4"></path>
<!-- Decorative Dot (Nuqta) influence -->
<circle cx="50" cy="10" r="4"></circle>
</svg>
</div>
</div>
<!-- Title Section -->
<div class="text-center space-y-2">
<h1 class="text-4xl md:text-5xl font-extrabold tracking-tight font-headline text-primary-fixed">
                    دلتا ليب
                </h1>
<p class="text-on-surface-variant text-sm md:text-base font-medium tracking-[0.2em] uppercase opacity-60">
                    Delta Leap
                </p>
</div>
</div>
<!-- Loading Indicator Area -->
<div class="absolute bottom-24 w-full max-w-[200px] px-4">
<!-- Progress Track -->
<div class="h-[2px] w-full bg-surface-container-highest rounded-full overflow-hidden relative">
<!-- Animated Progress Fill -->
<div class="absolute h-full bg-primary-fixed loading-bar-animation shadow-[0_0_8px_rgba(227,255,0,0.5)]"></div>
</div>
<!-- Loading Text -->
<div class="mt-6 flex justify-center">
<span class="text-[10px] font-label text-primary-fixed tracking-widest opacity-80">
                    جاري التحميل...
                </span>
</div>
</div>

<div class="absolute bottom-10">
<p class="text-[10px] font-label text-white/20">
                © 2024 THE NEON SCHOLAR ECOSYSTEM
            </p>
</div>
</main>
<!-- Invisible Accessibility Landmark -->
<footer class="sr-only">
        Splash screen for Delta Leap language learning application.
    </footer>
